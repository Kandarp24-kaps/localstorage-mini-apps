<!DOCTYPE html>
<html>
<head>
<title>Gemini AI Chat Panel</title>

<style>

body{
font-family:Arial;
background:#bd7878;
padding:20px;
}

h2{
margin-bottom:10px;
}

#chatBox{
border:1px solid #ccc;
background:white;
height:350px;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
}

.user{
color:blue;
margin:6px 0;
}

.ai{
color:rgb(3, 5, 3);
margin:6px 0;
}

.loading{
color:rgb(51, 41, 41);
font-style:italic;
}

input{
width:70%;
padding:8px;
}

button{
padding:8px 12px;
cursor:pointer;
margin-left:5px;
}

</style>
</head>

<body>

<h2>Gemini AI Chat Panel</h2>

<div id="chatBox"></div>

<input id="userInput" placeholder="Ask Gemini something...">
<button onclick="sendMessage()">Send</button>
<button onclick="clearChat()">Clear</button>

<script src="config.js"></script>
<script>
const API_KEY = CONFIG.API_KEY;
    

const chatBox = document.getElementById("chatBox")
const input = document.getElementById("userInput")

// Load previous chat
window.onload = function(){

let history = JSON.parse(localStorage.getItem("chatHistory")) || []

history.forEach(msg=>{
chatBox.innerHTML += msg
})

chatBox.scrollTop = chatBox.scrollHeight
}


// Send message
async function sendMessage(){

const userText = input.value.trim()

if(userText === "") return

let userMsg = `<p class="user"><b>User:</b> ${userText}</p>`
chatBox.innerHTML += userMsg

chatBox.scrollTop = chatBox.scrollHeight

let loadingMsg = `<p class="loading" id="loadingMsg">Gemini is thinking...</p>`
chatBox.innerHTML += loadingMsg

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[{text:userText}]
}
]
})
}
)

const data = await response.json()

console.log(data)

document.getElementById("loadingMsg").remove()

const reply = data.candidates[0].content.parts[0].text

let aiMsg = `<p class="ai"><b>Gemini:</b> ${reply}</p>`

chatBox.innerHTML += aiMsg

saveChat(userMsg + aiMsg)

}
catch(error){

document.getElementById("loadingMsg").remove()

let aiMsg = `<p class="ai"><b>Gemini:</b> Error getting response</p>`

chatBox.innerHTML += aiMsg

}

input.value=""

chatBox.scrollTop = chatBox.scrollHeight

}


// Save messages
function saveChat(message){

let history = JSON.parse(localStorage.getItem("chatHistory")) || []

history.push(message)

localStorage.setItem("chatHistory",JSON.stringify(history))

}


// Clear chat
function clearChat(){

localStorage.removeItem("chatHistory")

chatBox.innerHTML=""

}


// Press Enter to send
input.addEventListener("keypress",function(e){

if(e.key === "Enter"){
sendMessage()
}

})

</script>

</body>
</html>
