<!DOCTYPE html>
<html>
<head>
<title>Tech News</title>

<style>

body{
font-family:Arial;
background:#173eda;
text-align:center;
}

#news{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgb(164, 48, 48);
padding:15px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

a{
color:rgb(189, 189, 203);
text-decoration:none;
}

#loading{
display:none;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Tech News</h1>

<button id="btn">Load Startup News</button>

<div id="loading">Loading news...</div>

<div id="news"></div>

<script>

const btn = document.getElementById("btn")

btn.addEventListener("click", getNews)

async function getNews(){

const url = `https://hn.algolia.com/api/v1/search?query=popular`;

const res = await fetch(url)

const data = await res.json()

console.log("data:", data)

showNews(data.hits)

}

function showNews(articles){

const container = document.getElementById("news")

container.innerHTML = ""

articles.slice(0,10).forEach(article => {

if(!article.title) return

const div = document.createElement("div")

div.className = "card"

div.innerHTML = `
<h3>${article.title}</h3>
<p>Author: ${article.author}</p>
<a href="${article.url}" target="_blank">Read</a>
`

container.appendChild(div)

})

}

</script>

</body>
</html>
