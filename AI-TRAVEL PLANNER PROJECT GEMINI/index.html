<!DOCTYPE html>
<html>
<head>
<title>AI Travel Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 AI Travel Planner</h1>

<div class="container">

<input id="destination" placeholder="Destination (e.g. Japan)">
<input id="days" placeholder="Number of days">
<input id="budget" placeholder="Budget (low / medium / high)">
<input id="interests" placeholder="Interests (culture, food, adventure,destinations)">

<button onclick="planTrip()">Generate Travel Plan</button>

<div id="loading">✈️ Generating your travel plan...</div>

<div id="result"></div>

</div>
<script src="config.js"></script>
<script src="script.js"></script>


</body>
</html>
