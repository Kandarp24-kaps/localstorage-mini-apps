<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form id="form">

<div class="input-group">
<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">
<small id="nameError"></small>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">
<small id="emailError"></small>
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" id="phone" placeholder="Enter phone number">
<small id="phoneError"></small>
</div>

<div class="input-group">
<label>Password</label>

<div class="password-box">
<input type="password" id="password" placeholder="Enter password">
<span onclick="togglePassword()">👁</span>
</div>

<small id="strength"></small>

<ul class="rules">
<li id="lower">• lowercase letter</li>
<li id="upper">• uppercase letter</li>
<li id="number">• number</li>
<li id="special">• special character</li>
<li id="length">• minimum 8 characters</li>
</ul>

</div>

<button type="submit">Register</button>

</form>

</div>

<script>

const form = document.getElementById("form")

const nameInput = document.getElementById("name")
const emailInput = document.getElementById("email")
const phoneInput = document.getElementById("phone")
const passwordInput = document.getElementById("password")

const lower = document.getElementById("lower")
const upper = document.getElementById("upper")
const number = document.getElementById("number")
const special = document.getElementById("special")
const lengthRule = document.getElementById("length")

nameInput.addEventListener("input", () => {

if(nameInput.value.length < 3){
document.getElementById("nameError").innerText="Name must be at least 3 characters"
}else{
document.getElementById("nameError").innerText=""
}

})

emailInput.addEventListener("input", () => {

let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/

if(!emailInput.value.match(pattern)){
document.getElementById("emailError").innerText="Invalid Email"
}else{
document.getElementById("emailError").innerText=""
}

})

phoneInput.addEventListener("input", () => {

let pattern = /^[0-9]{10}$/

if(!phoneInput.value.match(pattern)){
document.getElementById("phoneError").innerText="Phone must be 10 digits"
}else{
document.getElementById("phoneError").innerText=""
}

})

passwordInput.addEventListener("keyup", () => {

let pass = passwordInput.value

let lowerCase = /[a-z]/
let upperCase = /[A-Z]/
let numbers = /[0-9]/
let specialChar = /[!@#$%^&*]/

lower.style.color = lowerCase.test(pass) ? "green" : "red"
upper.style.color = upperCase.test(pass) ? "green" : "red"
number.style.color = numbers.test(pass) ? "green" : "red"
special.style.color = specialChar.test(pass) ? "green" : "red"
lengthRule.style.color = pass.length >= 8 ? "green" : "red"

})

function togglePassword(){

if(passwordInput.type === "password"){
passwordInput.type="text"
}else{
passwordInput.type="password"
}

}

form.addEventListener("submit",(e)=>{

e.preventDefault()

let submission = {
name:nameInput.value,
email:emailInput.value,
phone:phoneInput.value,
password:passwordInput.value
}

let data = JSON.parse(localStorage.getItem("submissions")) || []

data.push(submission)

localStorage.setItem("submissions",JSON.stringify(data))

alert("Registration Saved!")

form.reset()

})

</script>

</body>
</html>
